name: Link Check
on:
  push:
    paths:
      - 'src/**'
      - 'cocktails.json'
      - 'origin-stories.json'
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress './**/*.astro' './**/*.md' './**/*.mdx' './**/*.ts' './**/*.mjs'
          fail: true
