# Configuration for the lychee link checker.
# Used by .github/workflows/link-check.yml and picked up automatically
# when running `lychee` locally from the repo root.

# 405 Method Not Allowed means the URL exists but refuses GET. The MCP
# server at /mcp is POST-only, so lychee's GET probe correctly returns
# 405 — a working endpoint, not a broken link.
accept = ["200..=299", "405"]

# Dependency sources carry deliberately-broken test URLs; never our links.
exclude_path = ["node_modules"]

exclude = [
  # API endpoint called from build scripts via fetch(), not a link.
  'openrouter\.ai',
  # JSON Schema `$schema` identifier in the generated agent-skills index —
  # a schema URI, not a navigable link, and not required to resolve.
  'schemas\.agentskills\.io',
  # Local dev-server address baked into a tooling script.
  'localhost',
  # Template-literal URLs (`${...}`) mis-extracted from .astro/script
  # source — not real links. lychee keeps the interpolation brace either
  # literal (`${`) or percent-encoded (`%7B`); exclude both forms.
  '\$\{',
  '%7B',
]
